project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!SETUP.md"

website:
  title: "Raunit Budhiraja"
  
  navbar:
    title: false
    background: "#0a0a0f"
    foreground: "#e2e2e2"
    right:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: projects/index.qmd
        text: Projects
      - href: reflections.qmd
        text: Reflections
      - href: contact.qmd
        text: Contact
      - href: cv/raunit_cv.pdf
        text: CV
        target: _blank
      - icon: github
        href: https://github.com/raunitbudhiraja02
        target: _blank
      - icon: linkedin
        href: https://www.linkedin.com/in/raunit-budhiraja-980595203/
        target: _blank
  page-footer:
    background: "#0a0a0f"
    left: "© 2026 Raunit Budhiraja"
    right: "Built with Quarto & GitHub Pages"

format:
  html:
    theme:
      - darkly
      - styles.scss
    mainfont: "DM Sans"
    monofont: "JetBrains Mono"
    toc: false
    page-layout: full
    code-fold: true
    highlight-style: dracula
